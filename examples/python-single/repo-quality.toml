schema_version = 1

[repository]
purpose = "python-single"
package = "example_package"
required_paths = ["CONTRIBUTING.md", "SECURITY.md"]

[documentation]
readme_sections = ["Purpose", "Installation", "Usage", "Development"]
agents_sections = ["Repository Purpose", "Quality Gates", "Testing Policy"]

[quality]
ci_workflow = ".github/workflows/quality.yml"
commands = [
  "uv run pre-commit run --all-files",
  "uv run ruff format --check .",
  "uv run ruff check .",
  "uv run ty check",
  "uv run pytest",
  "uv build",
]
