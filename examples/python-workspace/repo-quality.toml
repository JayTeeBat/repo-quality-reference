schema_version = 1

[repository]
purpose = "python-workspace"
required_paths = ["CONTRIBUTING.md", "SECURITY.md", "docs/adr"]

[documentation]
readme_sections = ["Purpose", "Package Map", "Development", "Releases"]
agents_sections = [
  "Repository Purpose",
  "Package Boundaries",
  "Quality Gates",
  "Testing Policy",
]

[quality]
ci_workflow = ".github/workflows/quality.yml"
commands = [
  "uv run pre-commit run --all-files",
  "uv run ruff format --check .",
  "uv run ruff check .",
  "uv run ty check",
  "uv run pytest",
  "uv build --all-packages",
]
