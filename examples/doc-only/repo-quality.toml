schema_version = 1

[repository]
purpose = "doc-only"
required_paths = ["CONTRIBUTING.md"]

[documentation]
readme_sections = ["Purpose", "Navigation", "Contributing"]
agents_sections = ["Repository Purpose", "Quality Gates", "Documentation Rules"]

[quality]
ci_workflow = ".github/workflows/quality.yml"
commands = [
  "uv run check-docs-format",
  "uv run check-docs-links",
  "uv run build-docs",
]
