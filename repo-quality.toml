schema_version = 1

[repository]
purpose = "python-single"
package = "repo_quality"
required_paths = [
  "CHANGELOG.md",
  "CONTRIBUTING.md",
  "LICENSE",
  "mkdocs.yml",
  "SECURITY.md",
  "docs/adr",
  "examples",
]

[documentation]
readme_sections = [
  "Purpose",
  "Quick Start",
  "Repository Shapes",
  "Quality Gates",
  "Repository Layout",
]
agents_sections = [
  "Repository Purpose",
  "Source Of Truth",
  "Working Agreements",
  "Quality Gates",
  "Testing Policy",
  "Documentation Rules",
  "Change Control",
]

[quality]
ci_workflow = ".github/workflows/quality.yml"
commands = [
  "uv run pre-commit run --all-files",
  "uv run ruff format --check .",
  "uv run ruff check .",
  "uv run ty check",
  "uv run pytest",
  "uv run repo-quality check .",
  "uv run check-docs-format",
  "uv run check-docs-links",
  "uv run build-docs",
  "uv build",
]
